external_components:
  - source: "github://SeByDocKy/myESPhome/"
    components: [dualpidpcm]
    refresh: 0s


globals:    
  - id: ${dualpidpcm_name}_exported_energy_yesterday_global
    type: float
    restore_value: yes
    
  - id: ${dualpidpcm_name}_imported_energy_yesterday_global
    type: float
    restore_value: yes

time:
  - platform: homeassistant #sntp
    id: !extend my_time
  
    on_time:
      - seconds: 59
        minutes: 59
        hours: 23
        then:  
          - globals.set:
              id: ${dualpidpcm_name}_exported_energy_yesterday_global
              value: !lambda return ( id(${dualpidpcm_name}_exported_energy_yesterday_global) =  float( id(${dualpidpcm_name}_exported_energy_today).state) ); 
                
          - globals.set:
              id: ${dualpidpcm_name}_imported_energy_yesterday_global
              value: !lambda return ( id(${dualpidpcm_name}_imported_energy_yesterday_global) =  float( id(${dualpidpcm_name}_imported_energy_today).state) );

    
dualpidpcm:
  - id: ${dualpidpcm_id}
    input_id: ${dualpidpcm_name}_input_smoothed 
    battery_voltage_id: ${dualpidpcm_battery_voltage_id}
    charging_output_id: ${dualpidpcm_charging_output_id}
    discharging_output_id: ${dualpidpcm_discharging_output_id}
    discharge_charge_switch_id: ${dualpidpcm_discharge_charge_switch_id}
    onoff_switch_id: ${dualpidpcm_onoff_switch_id}
    current_min_charging: ${dualpidpcm_current_min_charging}
    current_min_discharging: ${dualpidpcm_current_min_discharging}
    
sensor:
  - platform: copy
    source_id: ${dualpidpcm_input_id}
    name: ${name}_${dualpidpcm_name}_input_smoothed
    id: ${dualpidpcm_name}_input_smoothed
    device_class: energy
    icon: mdi:power
    unit_of_measurement: 'W'
    accuracy_decimals: 1
    filters:
      - sliding_window_moving_average:
          window_size: ${dualpidpcm_windows_size}
          send_every: 1

  - platform: template
    name: ${name}_${dualpidpcm_name}_exported_power
    id: ${dualpidpcm_name}_exported_power
    unit_of_measurement: 'W'
    accuracy_decimals: 1
    update_interval: ${dualpidpcm_template_update}
    icon: mdi:counter
    lambda: |-
      if ((id(${dualpidpcm_name}_activation).state) && float(id(${dualpidpcm_name}_input_smoothed).state) < 0.0f){
        return ( - id(${dualpidpcm_name}_input_smoothed).state );   
      }
      else {
        return 0.0f;
      }

  - platform: total_daily_energy
    name: ${name}_${dualpidpcm_name}_exported_energy_today
    id: ${dualpidpcm_name}_exported_energy_today
    power_id: ${dualpidpcm_name}_exported_power
    unit_of_measurement: 'kWh'
    accuracy_decimals: 1
    method: trapezoid
    filters:
       # Multiplication factor from W to kW is 0.001
       - multiply: 0.001
    icon: mdi:counter
    
  - platform: template
    name: ${name}_${dualpidpcm_name}_exported_energy_yesterday
    id: ${dualpidpcm_name}_exported_energy_yesterday
    unit_of_measurement: 'kWh'
    accuracy_decimals: 1
    icon: mdi:counter
    update_interval: ${dualpidpcm_template_update}
    lambda: |-
      return ( id(${dualpidpcm_name}_exported_energy_yesterday).state = id(${dualpidpcm_name}_exported_energy_yesterday_global) );


  - platform: template
    name: ${name}_${dualpidpcm_name}_imported_power
    id: ${dualpidpcm_name}_imported_power
    unit_of_measurement: 'W'
    accuracy_decimals: 1
    update_interval: ${dualpidpcm_template_update}
    icon: mdi:counter
    lambda: |-
      if ((id(${dualpidpcm_name}_activation).state) && float(id(${dualpidpcm_name}_input_smoothed).state) > 0.0f){
        return ( id(${dualpidpcm_name}_input_smoothed).state );   
      }
      else {
        return 0.0f;
      }

  - platform: total_daily_energy
    name: ${name}_${dualpidpcm_name}_imported_energy_today
    id: ${dualpidpcm_name}_imported_energy_today
    power_id: ${dualpidpcm_name}_imported_power
    unit_of_measurement: 'kWh'
    accuracy_decimals: 1
    method: trapezoid
    filters:
       # Multiplication factor from W to kW is 0.001
       - multiply: 0.001
    icon: mdi:counter
    
  - platform: template
    name: ${name}_${dualpidpcm_name}_imported_energy_yesterday
    id: ${dualpidpcm_name}_imported_energy_yesterday
    unit_of_measurement: 'kWh'
    accuracy_decimals: 1
    icon: mdi:counter
    update_interval: ${dualpidpcm_template_update}
    lambda: |-
      return ( id(${dualpidpcm_name}_imported_energy_yesterday).state = id(${dualpidpcm_name}_imported_energy_yesterday_global) );     


          
  - platform: dualpidpcm
    dualpidpcm_id: ${dualpidpcm_id}
    input:
      name: ${name}_${dualpidpcm_name}_input
    error: 
      name: ${name}_${dualpidpcm_name}_error
    output:
      name: ${name}_${dualpidpcm_name}_output
    output_charging: 
      name: ${name}_${dualpidpcm_name}_output_charging
    output_discharging: 
      name: ${name}_${dualpidpcm_name}_output_discharging
    mode:
      name: ${name}_${dualpidpcm_name}_mode
   

binary_sensor:
  - platform: dualpidpcm
    dualpidpcm_id: ${dualpidpcm_id}
    deadband:
      name: ${name}_${dualpidpcm_name}_deadband

  
switch:
  - platform: dualpidpcm
    dualpidpcm_id: ${dualpidpcm_id}
    activation: 
      name: ${name}_${dualpidpcm_name}_activation
      id: ${dualpidpcm_name}_activation
    manual_override: 
      name: ${name}_${dualpidpcm_name}_manual_override
      id:  ${dualpidpcm_name}_manual_override
    pid_mode: 
      name: ${name}_${dualpidpcm_name}_pid_mode
      id:  ${dualpidpcm_name}_pid_mode
    reverse: 
      name: ${name}_${dualpidpcm_name}_reverse
      id:  ${dualpidpcm_name}_reverse
      
number:
  - platform: dualpidpcm
    dualpidpcm_id: ${dualpidpcm_id}
    setpoint:
      name: ${name}_${dualpidpcm_name}_setpoint
    starting_battery_voltage: 
      name: ${name}_${dualpidpcm_name}_starting_battery_voltage
    kp: 
      name: ${name}_${dualpidpcm_name}_kp
    ki: 
      name: ${name}_${dualpidpcm_name}_ki
    kd: 
      name: ${name}_${dualpidpcm_name}_kd      
    output_min_charging: 
      name: ${name}_${dualpidpcm_name}_output_min_charging
    output_max_charging: 
      name: ${name}_${dualpidpcm_name}_output_max_charging
    output_min_discharging: 
      name: ${name}_${dualpidpcm_name}_output_min_discharging
    output_max_discharging: 
      name: ${name}_${dualpidpcm_name}_output_max_discharging
