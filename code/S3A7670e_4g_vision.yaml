mqtt:
  broker: !secret cloud_mqtt_address 
  port: 8883
  topic_prefix: null
  discovery_prefix: device/${name}/camera/config
  birth_message:
    topic: device/${name}/birth/topic
    payload: online
  will_message:
    topic: device/${name}/will/topic
    payload: offline
  shutdown_message:
    topic: device/${name}/shutdown/topic
    payload: "mqtt disconnected"
  username: !secret cloud_mqtt_user 
  password: !secret cloud_mqtt_password
  client_id: ${name}
  certificate_authority: !secret cloud_certificate
  skip_cert_cn_check: false
  on_message:
    # Topic pour contrôler l'inference : envoyer "on" ou "off"
    - topic: ${income_topic}/s3a7670e_inference
      qos: 0
      then:
        - if:
            condition:
              lambda: 'return x == "on" || x == "ON" || x == "1" || x == "true";'
            then:
              - vision.start: 
                  id: my_vision
              - mqtt.publish:
                  topic: device/${name}/inference/state
                  retain: true
                  payload: "on"
              - logger.log: "VISION enabled via MQTT"
            else:
              - vision.stop: 
                  id: my_vision
              - mqtt.publish:
                  topic: device/${name}/inference/state
                  retain: true
                  payload: "off"
              - logger.log: "VISION disabled via MQTT"

    - topic: ${income_topic}/s3a7670e_flash_ota 
      qos: 0
      then:
        - if:
            condition:
              lambda: 'return x == "on" || x == "ON" || x == "1" || x == "true";'
            then:
              - ota.http_request.flash:
                  md5_url: ${md5_url}
                  url: ${bin_url}              
              - logger.log: "This message should be not displayed because the device reboots"
              
    - topic: ${income_topic}/s3a7670e_led 
      qos: 0
      then:
        - if:
            condition:
              lambda: 'return x == "on" || x == "ON" || x == "1" || x == "true";'
            then:
              - light.turn_on:
                  id: led
              - mqtt.publish:
                  topic: device/${name}/led/state
                  retain: true
                  payload: "on"    
              - logger.log: "LED is turned on"
            else:
              - light.turn_off:
                  id: led
              - mqtt.publish:
                  topic: device/${name}/led/state
                  retain: true
                  payload: "off"    
              - logger.log: "LED is turned on"
              
    - topic: ${income_topic}/s3a7670e_relay
      qos: 0
      then:
        - if:
            condition:
              lambda: 'return x == "on" || x == "ON" || x == "1" || x == "true";'
            then:
              - switch.turn_on:
                  id: relay
              - mqtt.publish:
                  topic: device/${name}/relay/state
                  retain: true
                  payload: "on"    
              - logger.log: "Relay is turned on"
            else:
              - switch.turn_off:
                  id: relay
              - mqtt.publish:
                  topic: device/${name}/relay/state
                  retain: true
                  payload: "off"    
              - logger.log: "Relay is turned on"              
                  
