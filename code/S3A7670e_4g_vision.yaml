  apn: free
  pin_code: !secret sim_pin
  # enable_cmux: True
  dte_buffer_size: 1024
  # we can send initial AT commands at setup
  init_at:
    - AT+GMM  # model
    - AT+CGNSSPWR=1
    - AT+CGNSSTST=1
    - AT+CGNSSPORTSWITCH=0,1
  # on_not_responding:
