    on_value:
      then: 
        if:
          condition:
            modem.connected:
          then:
            - mqtt.publish:
                topic: device/${name}/temperature/state
                payload: !lambda "return std::to_string(x);"
            - logger.log:
                 format: "mqtt publish succesfully temperature with value %s"
                 args: [ 'std::to_string(x).c_str()' ]   
    
    
text_sensor:
  - platform: template
    name: ${name}_uptime
    lambda: |-
      int seconds = (id(uptime_sec).state);
      int days = seconds / (24 * 3600);
      seconds = seconds % (24 * 3600); 
      int hours = seconds / 3600;
      seconds = seconds % 3600;
      int minutes = seconds /  60;
      seconds = seconds % 60;
      if ( days ) {
        return { (std::to_string(days) +"d " + std::to_string(hours) +"h " + std::to_string(minutes) +"m "+ std::to_string(seconds) +"s ").c_str() };
      } else if ( hours ) {
        return { (std::to_string(hours) +"h " + std::to_string(minutes) +"m "+ std::to_string(seconds) +"s ").c_str() };
      } else if ( minutes ) {
        return { (std::to_string(minutes) +"m "+ std::to_string(seconds) +"s ").c_str() };
      } else {
        return { (std::to_string(seconds) +"s ").c_str() };
      }
    icon: mdi:clock-start
    update_interval: 113s
    on_value:
      then: 
        if:
          condition:
            modem.connected: 
          then:
            - mqtt.publish:
                topic: device/${name}/uptime/state
                payload: !lambda "return x;"
            - logger.log:
                 format: "mqtt publish succesfully uptime with value %s"
                 args: [ 'x' ]
 
