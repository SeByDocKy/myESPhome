esphome:
  name: ${name}
  min_version: 2026.1.0
  on_boot:
    # - priority: -100
      # then:
        # - component.suspend: gps_id
        # - script.execute: delay_start_gps
    - priority: -100
      then:
        - if:
            condition:
              modem.connected:
            then:
              - mqtt.publish: 
                  topic: device/${name}/camera/config
                  retain: true
                  payload: |-  
                    {"component": "image", "name": "ESP32 Camera Picture", "unique_id": ${name}"_camera", "content_type": "image/jpeg", "image_encoding": "b64", "encoding": "image_encoding", "icon": "mdi:image", "device": {
                    "identifiers": [${name}], "name": ${name}, "manufacturer": "Espressif", "model": "ESP32-S3", "sw_version": "1.0.0"}}
              - mqtt.publish:
                  topic: device/${name}/sensor/config
                  retain: true
                  payload: |-
                    {"component":"sensor","name":"ESP32 face detection", "unique_id": ${name}"_face_detection",  "icon":"mdi:human-male-female","device":{"identifier":${name}, "name":${name},"manufacturer":"Smartphoton","model":"MQTT-2ways-sync","sw_version":"1.0.3"}}         
  
esp32:
  board: esp32-s3-devkitc-1
  cpu_frequency: 240Mhz
  flash_size: 16MB
  partitions: partitions_custom_16mb.csv
  framework:
    type: esp-idf
    version: dev
    advanced:
      enable_idf_experimental_features: yes
    sdkconfig_options:
      CONFIG_COMPILER_OPTIMIZATION_PERF: y
      CONFIG_ESP32_DEFAULT_CPU_FREQ_240: y
      CONFIG_UART_ISR_IN_IRAM: y
      ESP_MODEM_CMUX_DEFRAGMENT_PAYLOAD: n
      ESP_MODEM_USE_INFLATABLE_BUFFER_IF_NEEDED: y
      ESP_MODEM_CMUX_USE_SHORT_PAYLOADS_ONLY: y
      CONFIG_ESP_TASK_WDT_TIMEOUT_S: "60"  #"60"
      CONFIG_PARTITION_TABLE_CUSTOM: "y"
      CONFIG_PARTITION_TABLE_CUSTOM_FILENAME: "partitions_custom_16mb.csv"
      CONFIG_ESPTOOLPY_FLASHSIZE_16MB: "y"
      

