esp32_camera:
  name: ${name}_camera
  id: my_camera
  external_clock:
    pin: GPIO39 
    frequency: 20MHz
  i2c_id: my_i2c
  data_pins: [GPIO07, GPIO08, GPIO09, GPIO10, GPIO11, GPIO12, GPIO13, GPIO14]
  vsync_pin: GPIO42 #GPIO36
  href_pin: GPIO41 #GPIO35
  pixel_clock_pin: GPIO46 #GPIO37
  resolution: ${resolution} #640x480
  pixel_format: rgb565 
  # jpeg_quality: 10
  frame_buffer_count: 1
  frame_buffer_location: 'PSRAM'
  idle_framerate: 0.05fps
  vertical_flip: false
  horizontal_mirror: false
