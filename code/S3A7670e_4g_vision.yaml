              - logger.log:
                  format: "MQTT snapshot published (%u bytes)"
                  args: ['(unsigned) image.length']
                  
              - mqtt.publish:
                  topic: device/${name}/camera_event/state
                  payload: !lambda return id(my_vision).get_inference_json();    
                  
