sensor:
  - platform: uptime
    id: uptime_sec
    update_interval: '5s'
    
  - platform: max17048
    i2c_id: my_i2c
    address: 0x36
    update_interval: 60s
    battery_voltage:
      name: ${name}_battery_voltage
      id : battery_voltage
      on_value:
        then: 
          if:
            condition:
              modem.connected:
            then:
              - mqtt.publish:
                  topic: device/${name}/battery_voltage/state
                  payload: !lambda "return std::to_string(x);"
              - logger.log:
                   format: "mqtt publish succesfully battery voltage with value %s"
                   args: [ 'std::to_string(x).c_str()' ]
    battery_level:
      name: ${name}_battery_level
      id: battery_level
      on_value:
        then: 
          if:
            condition:
              modem.connected:
            then:
              - mqtt.publish:
                  topic: device/${name}/battery_soc/state
                  payload: !lambda "return std::to_string(x);"
              - logger.log:
                   format: "mqtt publish succesfully battery soc with value %s"
                   args: [ 'std::to_string(x).c_str()' ]
    rate:
      name: ${name}_battery_discharge_rate
      id: battery_discharge_rate
    
