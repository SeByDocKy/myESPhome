  id: my_vision
  esp32_camera_id: my_camera
  model_family: ${model_family}
  model_id: my_model  
  score_threshold: 0.30
  nms_threshold: 0.50
  detection_interval_ms: 200
  max_detections: 5
  inference_task_stack_size: 8192
  inference_task_priority: 5
  draw_outputs: true
  frame_width: 320
  frame_height: 240

  on_object_detected:
    - then:
        - logger.log:
            format: "Detected %d objects: %s"
            args: ["object_count", "summary.c_str()"]

  on_augmented_image:
    - then:
        - if:
            condition:
