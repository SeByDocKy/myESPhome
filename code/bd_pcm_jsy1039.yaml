substitutions:
  name: "bd_pcm"
  device_description: "Bidirectional battery AC coupling with direct power readings"
  my_hours: '23'
  my_minute: '59'
  my_second: '59'
  baud_rate: 9600 #UART1 protocol = 013, set baud_rate=9600
  powermeter_modbus_address: '1'
  bms_modbus_address: '2'
  
esphome:
  name: ${name}
  comment: ${device_description}
  min_version: 2026.7.0
  platformio_options:
    # build_flags: -DBOARD_HAS_PSRAM
    board_build.arduino.memory_type: qio_opi
    board_build.f_flash: 80000000L
    board_build.flash_mode: qio
    # lib_compat_mode: "off"
    # build_flags: -DUSE_ARDUINO
   
esp32:
  board: seeed_xiao_esp32s3
  variant: esp32s3
  cpu_frequency: 240Mhz
  toolchain: platformio
  framework:
    type: esp-idf
    version: 'dev'

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "battery_bidirectional"
    password: !secret ap_password
    
    
time:
  - platform: sntp
    id: my_time    

api:
  batch_delay: 50ms

ota:
  - platform: esphome
  
logger:
  # hardware_uart: USB_SERIAL_JTAG
   level: debug
    
uart: 
  - id: uart_0
    tx_pin: GPIO43 #GPIO43
    rx_pin: GPIO44 #GPIO44
    baud_rate: ${baud_rate}
    parity: none
    data_bits: 8
    stop_bits: 1
    
modbus:
  - id: modbus_rtu
    uart_id: uart_0
    # type: RTU
    send_wait_time: 50ms
    turnaround_time: 100ms

spi:

  - id: shared_spi
    mosi_pin: GPIO09
    miso_pin: GPIO08
    clk_pin: GPIO07
    interface: spi3

debug:
  update_interval: 5s

sensor:

  - platform: wifi_signal
    name: ${name}_wifi_power
    id: wifi_power
    update_interval: 5s
    
  - platform: uptime
    id: uptime_sec
     
  - platform: debug
    free:
      name: ${name}_heap_free
    loop_time:
      name: ${name}_loop_time
       
binary_sensor:
  - platform: status
    name: ${name}_esp_status
     
button:
  - platform: restart
    name: ${name}_restart
    
text_sensor:
  - platform: template
    name: ${name}_uptime
    lambda: |-
      int seconds = (id(uptime_sec).state);
      int days = seconds / (24 * 3600);
      seconds = seconds % (24 * 3600); 
      int hours = seconds / 3600;
      seconds = seconds % 3600;
      int minutes = seconds /  60;
      seconds = seconds % 60;
      if ( days ) {
        return { (std::to_string(days) +"d " + std::to_string(hours) +"h " + std::to_string(minutes) +"m "+ std::to_string(seconds) +"s ").c_str() };
      } else if ( hours ) {
        return { (std::to_string(hours) +"h " + std::to_string(minutes) +"m "+ std::to_string(seconds) +"s ").c_str() };
      } else if ( minutes ) {
        return { (std::to_string(minutes) +"m "+ std::to_string(seconds) +"s ").c_str() };
      } else {
        return { (std::to_string(seconds) +"s ").c_str() };
      }  
    icon: mdi:clock-start
    update_interval: 113s
    
              
packages: 

  powermeter_1:
    url: https://github.com/SeByDocKy/myESPhome/
    ref: main
    refresh: 0s
    files:
      - path: 'code/device_jsy1039.yaml' 
        vars:
          powermeter_name: 'jsy1039'
          powermeter_modbus_id: 'modbus_rtu'
          powermeter_address: ${powermeter_modbus_address}
          powermeter_update_interval: '1500ms'  #'2000ms' for HMS
          powermeter_template_update: '1500ms'
                    
  bms: 
    url: https://github.com/SeByDocKy/pvbrain2/
    ref: main
    refresh: 0s
    files: 
      - path: 'pvbrain2/bms/jikong/device_jkpbbms.yaml'
        vars:
          bms_name: 'jkpbbms'
          bms_modbus_id: 'modbus_rtu'
          bms_modbus_address: ${bms_modbus_address}  #dip switches OFF ON OFF OFF
          bms_update_interval: '1500ms'
          bms_template_update: '3s'
          bms_text_update: '60s'
          bms_modbus_throttle: '50ms'          

  pcm: 
    url: https://github.com/SeByDocKy/myESPhome/
    ref: main
    refresh: 0s
    files: 
      - path: 'code/device_mcp2515_pcm.yaml' 
        vars:
          pcm_name: 'pcm'
          pcm_spid_id: 'shared_spi'
          pcm_cs_pin: 'GPIO06'
          pcm_canbus_id: 'pcm_can'
          pcm_address: '01'
          pcm_interval: '5s' #'2500ms' #'1500ms'  ### pooling interval for non-feedback registers 
          pcm_text_sensor_interval: '2500ms'
          pcm_min_charging: '1'
          pcm_max_charging: '70'
          pcm_min_discharging: '1'
          pcm_max_discharging: '75'
   
  dualpidpcm:
    url: https://github.com/SeByDocKy/myESPhome/
    ref: main
    refresh: 0s
    files:
      - path: 'code/device_dualpidpcm.yaml'
        vars:
          dualpidpcm_id: 'pid_id'
          dualpidpcm_name: 'pid'
          dualpidpcm_input_id: 'jsy1039_power'
          dualpidpcm_battery_voltage_id: 'jkpbbms_battery_voltage' #'battery_voltage_from_ha'
          dualpidpcm_charging_output_id: 'charging_current_output'
          dualpidpcm_discharging_output_id: 'discharging_current_output'
          dualpidpcm_discharge_charge_switch_id: 'discharge_charge_switch'
          dualpidpcm_onoff_switch_id: 'power_switch'
          dualpidpcm_current_min_charging: '1.0'
          dualpidpcm_current_min_discharging: '1.0'
          dualpidpcm_windows_size: '1'
          dualpidpcm_template_update: '5s'