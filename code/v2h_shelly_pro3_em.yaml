substitutions:
  name: "v2h_shelly_pro3_em"
  name_controller: "lora_meter"
  device_description: "Braco transfert V2H via WiFI modbus TCP "
  my_hours: '23'
  my_minute: '59'
  my_second: '59'
  shelly_ip_address: '192.168.1.45'
  shelly_ip_port: '512'
  shelly_modbus_address: '1'
 
 
globals:
  - id: phase_choice
    type: int
    restore_value: yes
    initial_value: '1' 
 
esphome:
  name: ${name}
  comment: ${device_description}
  min_version: 2026.5.0
  platformio_options:
    board_build.arduino.memory_type: qio_opi
    board_build.f_flash: 80000000L
    board_build.flash_mode: qio
  on_boot:
     priority: -100
     then: 
        - delay: 3s
        - output.set_level: 
            id: r48_max_current
            level: '100%'
        - output.set_level:
            id: output_combined
            level: '2%'
        - switch.turn_off: general_r48_switch            

esp32:
  board: seeed_xiao_esp32s3
  variant: esp32s3
  cpu_frequency: 240Mhz
  toolchain: platformio
  framework:
    type: arduino
    

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "battery_bidirectional"
    password: !secret ap_password
    
time:
  - platform: sntp
    id: my_time    

api:
  batch_delay: 50ms

ota:
  - platform: esphome
  
logger:
  # hardware_uart: USB_SERIAL_JTAG
  # level: verbose
  level: none
    
external_components:

  - source: "github://SeByDocKy/myESPhome/"
    components: [hms_inverter]
    refresh: 10s
     
  - source: github://creepystefan/esphome_tcp
    refresh: 10s     


modbustcp:
  - id: modbus_tcp
    host: ${shelly_ip_address}
    port: ${shelly_ip_port}
    send_wait_time: 100ms  
  
modbustcp_controller:
  - id: modbus_device_tcp
    modbustcp_id: modbus_tcp
    address: ${shelly_modbus_address}
    update_interval: 2s   #default 60sec


select:
  - platform: template
    name: ${name}_phase_select
    id: phase_select
    icon: mdi:power
    optimistic: false #true
    restore_value: true
    initial_option: 'p1'
    options:
      - 'p1'
      - 'p2'
      - 'p3'
    set_action:
      then:
        - globals.set:
           id: phase_choice
           value: !lambda |- 
             auto index = id(phase_select).active_index();
             return (index.value()+1);    

spi:

 #### when connected with the B2B connector (no change vs direct wiring)
  - id: shared_spi
    mosi_pin: GPIO09
    miso_pin: GPIO08
    clk_pin: GPIO07
    interface: spi3   #### spi2 is for CMT2300A

    
debug:
  update_interval: 5s
  
sensor:

  - platform: template
    id:  active_power
    name: ${name}_active_power
    accuracy_decimals: 1
    device_class: power
    icon: mdi:flash
    unit_of_measurement: 'W'

  - platform: modbustcp_controller
    modbustcp_controller_id: modbus_device_tcp
    name: ${name}_p1_active_power
    id: p1_active_power
    address: 1025  #1045=p2, 1065=p3
    value_type: FP32  
    register_type: read
    accuracy_decimals: 1
    device_class: power
    icon: mdi:flash
    unit_of_measurement: 'W'
    on_value:
      then:
       - lambda: |-
           if (id(phase_choice) == 1){
             id(active_power).publish_state(id(p1_active_power).state);
           }
    
  - platform: modbustcp_controller
    modbustcp_controller_id: modbus_device_tcp
    name: ${name}_p2_active_power
    id: p2_active_power
    address: 1045  #1045=p2, 1065=p3
    value_type: FP32  
    register_type: read
    accuracy_decimals: 1
    device_class: power
    icon: mdi:flash
    unit_of_measurement: 'W'
    on_value:
      then:
       - lambda: |-
           if (id(phase_choice) == 2){
             id(active_power).publish_state(id(p2_active_power).state);
           }

    
  - platform: modbustcp_controller
    modbustcp_controller_id: modbus_device_tcp
    name: ${name}_p3_active_power
    id: p3_active_power
    address: 1065  #1045=p2, 1065=p3
    value_type: FP32  
    register_type: read
    accuracy_decimals: 1
    device_class: power
    icon: mdi:flash
    unit_of_measurement: 'W'
    on_value:
      then:
       - lambda: |-
           if (id(phase_choice) == 3){
            id(active_power).publish_state(id(p3_active_power).state);
           }

  - platform: wifi_signal
    name: ${name}_wifi_power
    id: wifi_power
    update_interval: 5s
    
  - platform: uptime
    id: uptime_sec
        
  - platform: debug
    free:
      name: ${name}_heap_free
    loop_time:
      name: ${name}_loop_time
    
binary_sensor:
  - platform: status
    name: ${name}_esp_status
                     
  - platform: template
    id: hms_reachable
    name: ${name}_hms_reachable
    condition: 
      and:
        - binary_sensor.is_on: hms1_1000_reachable
        # - binary_sensor.is_on: hms2_1000_reachable
        
  - platform: template
    id: hms_producing
    name: ${name}_hms_producing
    condition: 
      and:
        - binary_sensor.is_on: hms1_1000_producing
        # - binary_sensor.is_on: hms2_1000_producing


  - platform: template
    id: hms_rssi_available
    name: ${name}_hms_rssi_available
    condition: 
      and:
        - lambda: |-
            return (id(hms1_1000_rssi).has_state() );
        # - lambda: |-
            # return (id(hms2_1000_rssi).has_state() );    


  - platform: template
    id: hms_is_100
    name: ${name}_hms_is_100
    condition: 
      or:
        - lambda: |-
            return (id(hms1_1000_percent_power_limit).state==100.0f );
        # - lambda: |-
            # return (id(hms2_1000_percent_power_limit).state==100.0f );


  - platform: template
    id: hms_is_2
    name: ${name}_hms_is_2
    condition: 
      or:
        - lambda: |-
            return (id(hms1_1000_percent_power_limit).state==2.0f );
        # - lambda: |-
            # return (id(hms2_1000_percent_power_limit).state==2.0f );

  - platform: template
    id: hms_is_0w
    name: ${name}_hms_is_0w
    condition: 
      or:
        - lambda: |-
            return (id(hms1_1000_absolute_power_limit).state==0.0f );
        # - lambda: |-
            # return (id(hms2_1000_absolute_power_limit).state==0.0f );

                     
text_sensor:
  - platform: template
    name: ${name}_uptime
    lambda: |-
      int seconds = (id(uptime_sec).state);
      int days = seconds / (24 * 3600);
      seconds = seconds % (24 * 3600); 
      int hours = seconds / 3600;
      seconds = seconds % 3600;
      int minutes = seconds /  60;
      seconds = seconds % 60;
      if ( days ) {
        return { (std::to_string(days) +"d " + std::to_string(hours) +"h " + std::to_string(minutes) +"m "+ std::to_string(seconds) +"s ").c_str() };
      } else if ( hours ) {
        return { (std::to_string(hours) +"h " + std::to_string(minutes) +"m "+ std::to_string(seconds) +"s ").c_str() };
      } else if ( minutes ) {
        return { (std::to_string(minutes) +"m "+ std::to_string(seconds) +"s ").c_str() };
      } else {
        return { (std::to_string(seconds) +"s ").c_str() };
      }
    icon: mdi:clock-start
    update_interval: 113s  

  
button:
  - platform: restart
    name: ${name}_restart
    
  - platform: template
    name: ${name}_hms_restart
    id: hms_restart
    on_press:
      - button.press: hms1_1000_restart
      # - button.press: hms2_1000_restart
      
switch:
    
  - platform: template
    name: ${name}_general_r48_switch
    id: general_r48_switch
    optimistic: true
    turn_on_action:
      - switch.turn_off: r48_ac_switch_turn_off
      - switch.turn_off: r48_dc_switch_turn_off
    turn_off_action:
      - switch.turn_on: r48_ac_switch_turn_off
      - switch.turn_on: r48_dc_switch_turn_off

output:
  - platform: template
    id: output_combined
    type: float
    write_action:
      - output.set_level:
          id: hms1_1000_percent_output
          level: !lambda return state;
          
      # - output.set_level:
          # id: hms2_1000_percent_output
          # level: !lambda return state;    
       
   
fan:
  - platform: speed
    id: output_combined_command
    name: ${name}_output_combined_command
    output: output_combined

hms_inverter:
  id: hoymiles_id
  update_interval: '2500ms' #'1500ms'#'1200ms'
  pins:
    cs: GPIO02
    fcs: GPIO03
    sdio: GPIO04
    clk: GPIO05
    
packages: 

  hms_inverter1: 
    url: https://github.com/SeByDocKy/myESPhome/
    ref: main
    refresh: 0s
    files:
      - path: 'code/device_hms_2t.yaml' 
        vars:
          hms_inverter_id: 'hoymiles_id'
          hms_inverter_name: 'hms1_1000'
          hms_inverter_sn: !secret hms1000_sn1
          hms_inverter_full_power_startup: false
          
  # hms_inverter2: 
    # url: https://github.com/SeByDocKy/myESPhome/
    # ref: main
    # refresh: 0s
    # files:
      # - path: 'code/device_hms_2t.yaml' 
        # vars:
          # hms_inverter_id: 'hoymiles_id'
          # hms_inverter_name: 'hms2_1000'
          # hms_inverter_sn: !secret hms1000_sn2     
          # hms_inverter_full_power_startup: false          
          
  # hms_inverter2: 
    # url: https://github.com/SeByDocKy/myESPhome/
    # ref: main
    # refresh: 0s
    # files:
      # - path: 'code/device_hms_4t.yaml' 
        # vars:
          # hms_inverter_id: 'hoymiles_id'
          # hms_inverter_name: 'hms2_2000'
          # hms_inverter_sn: !secret hms2000_sn1     
          # hms_inverter_full_power_startup: false          

  emerson:
    url: https://github.com/SeByDocKy/myESPhome/
    ref: main
    refresh: 0s
    files:
      - path: 'code/device_mcp2515_emerson_r48.yaml' 
        vars:
          emerson_name: 'r48'
          emerson_spid_id: 'shared_spi'
          emerson_cs_pin: 'GPIO06' #06
          emerson_update_interval: '2000ms' #'2500ms'
          emerson_template_update_interval: '2000ms' #'2500ms'
          

  minipid:
    url: https://github.com/SeByDocKy/myESPhome/
    ref: main
    refresh: 0s
    files:
      - path: 'code/device_minipid.yaml' 
        vars:
          minipid_id: 'pid_id'
          minipid_name: 'pid'
          minipid_input_id: 'active_power' 
          minipid_output_id: 'output_combined' 
          minipid_windows_size: '1'
     
  automation:
    url: https://github.com/SeByDocKy/myESPhome/
    ref: main
    refresh: 0s
    files:
      - path: 'code/automation_dualpid.yaml'
        vars: 
          automation_time_interval: '60s'
          automation_time_interval_fast: '5s'
          automation_output_combined: output_combined
          automation_activation: 'pid_activation'
          automation_reachable: 'hms_reachable'
          automation_producing: 'hms_producing'
          automation_rssi_available: 'hms_rssi_available'
          automation_hms_100: hms_is_100
          automation_hms_2: hms_is_2
          automation_hms_0w: hms_is_0w
          automation_restart: 'hms_restart'