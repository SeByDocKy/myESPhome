interval:
  - interval: ${automation_time_interval_fast}    
    then:
    - if:
         condition:
           and:
             - lambda: |-
                return ( !id(${automation_reachable}).has_state() );
             - binary_sensor.is_on: ${automation_reachable}
             - binary_sensor.is_off: ${automation_producing}
             - binary_sensor.is_on: ${automation_hms_100}
             - switch.is_off: ${automation_activation}
             # - lambda: |-
             #    return ( !id(${automation_percent_power_id}).has_state() );
             # - lambda: |-
             #    return ( id(${automation_percent_power_id}).state==100.0f );   
         then:
           # - number.set:
           #     id: ${automation_percent_power_id}
           #     value: 2
           - output.set_level:
               id: ${automation_output_combined}
               level: 0.02
           # - fan.turn_on:
           #     id: ${automation_hms_fan_id}
           #     speed: 2

  - interval: ${automation_time_interval}    
    then:
    - if:
         condition:
           and:
             - lambda: |-
                return ( !id(${automation_reachable}).has_state() ); 
         then:
           - switch.turn_off: ${automation_activation}
    - if:
         condition:
           and:
             - lambda: |-
                return ( id(${automation_reachable}).has_state() );
             - binary_sensor.is_on: ${automation_reachable}
             - binary_sensor.is_off: ${automation_producing}     
         then:
           - switch.turn_off: ${automation_activation}
           - button.press: ${automation_restart}
