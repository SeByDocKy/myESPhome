# --- Pilotage a distance des relais de chaque slave ---
# "optimistic: true" donne un retour immediat dans l'UI des le clic.
# L'etat reel est ensuite reconcilie automatiquement des reception de
# l'ACK du slave (voir bloc "else if (key == "ACK")" ci-dessus), donc si
# la commande echoue ou que le slave etait deja dans un autre etat,
# l'affichage se corrige tout seul en quelques secondes.
switch:
  - platform: template
    name: ${name}_slave0_relay0
    id: switch_slave0_relay0
    optimistic: true
    turn_on_action:
      - meshtastic.send_text_message:
          id: id_mesh
          channel: !secret meshstastic_channel_name
          text: "SLAVE:0,RELAY0:ON"
    turn_off_action:
      - meshtastic.send_text_message:
          id: id_mesh
          channel: !secret meshstastic_channel_name
          text: "SLAVE:0,RELAY0:OFF"

  - platform: template
    name: ${name}_slave1_relay0
    id: switch_slave1_relay0
    optimistic: true
    turn_on_action:
      - meshtastic.send_text_message:
          id: id_mesh
