substitutions:
  name: "bd_pcm"
  name_controller: "lora_meter"
  device_description: "Bidirectional battery AC coupling "
  my_hours: '23'
  my_minute: '59'
  my_second: '59'
  baud_rate: 115200 #9600 ### JKPBBMS baudrate : if UART1 protocol = 001, set baud_rate=115200, if UART1 protocol = 013, set baud_rate=9600
  shelly_ip_address: '192.168.1.45'
  shelly_ip_port: '512'
  shelly_modbus_address: '1'
  bms_modbus_address: '1'
  
  
globals:
  - id: phase_choice
    type: int
    restore_value: yes
    initial_value: '1'  
  
esphome:
  name: ${name}
  comment: ${device_description}
  min_version: 2025.10.1
  platformio_options:
    # build_flags: -DBOARD_HAS_PSRAM
    board_build.arduino.memory_type: qio_opi
    board_build.f_flash: 80000000L
    board_build.flash_mode: qio

   
esp32:
  board: seeed_xiao_esp32s3
  variant: esp32s3
  cpu_frequency: 240Mhz
  framework:
    type: esp-idf
    version: 'dev'

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "battery_bidirectional"
    password: !secret ap_password

   
external_components:
  - source: github://creepystefan/esphome_tcp
    # components: [modbustcp, modbustcp_controller]
    refresh: 0s  
  
  
modbustcp:
  - id: modbus_tcp
    host: ${shelly_ip_address}
    port: ${shelly_ip_port}
    send_wait_time: 100ms  
  
modbustcp_controller:
  - id: modbus_device_tcp
    modbustcp_id: modbus_tcp
    address: ${shelly_modbus_address}
    update_interval: 2s   #default 60sec


modbus:
  - id: modbus_rtu
    uart_id: uart_0
    send_wait_time: 50ms    
       
time:
  - platform: sntp
    id: my_time    

api:
  batch_delay: 50ms

ota:
  - platform: esphome
  
logger:
  # hardware_uart: USB_SERIAL_JTAG
   level: very_verbose
    
uart: 
  - id: uart_0
    tx_pin: GPIO43 #GPIO43
    rx_pin: GPIO44 #GPIO44
    baud_rate: ${baud_rate}
    parity: none
    data_bits: 8
    stop_bits: 1

spi:

 #### when connected with the B2B connector (no change vs direct wiring)
  - id: shared_spi
    mosi_pin: GPIO09
    miso_pin: GPIO08
    clk_pin: GPIO07
    interface: spi3

debug:
  update_interval: 5s
  
  
select:
  - platform: template
    name: ${name}_phase_select
    id: phase_select
    icon: mdi:power
    optimistic: false #true
    restore_value: true
    initial_option: 'p1'
    options:
      - 'p1'
      - 'p2'
      - 'p3'
    set_action:
      then:
        - globals.set:
           id: phase_choice
           value: !lambda |- 
             auto index = id(phase_select).active_index();
             return (index.value()+1);

sensor:

  - platform: template
    id: active_power
    name: ${name}_active_power
    accuracy_decimals: 1
    device_class: power
    icon: mdi:flash
    unit_of_measurement: 'W'

  - platform: modbustcp_controller
    modbustcp_controller_id: modbus_device_tcp
    name: ${name}_p1_active_power
    id: p1_active_power
    address: 1025  #1045=p2, 1065=p3
    value_type: FP32  
    register_type: read
    accuracy_decimals: 1
    device_class: power
    icon: mdi:flash
    unit_of_measurement: 'W'
    on_value:
      then:
       - lambda: |-
           if (id(phase_choice) == 1){
             id(active_power).publish_state(id(p1_active_power).state);
           }
    
  - platform: modbustcp_controller
    modbustcp_controller_id: modbus_device_tcp
    name: ${name}_p2_active_power
    id: p2_active_power
    address: 1045  #1045=p2, 1065=p3
    value_type: FP32  
    register_type: read
    accuracy_decimals: 1
    device_class: power
    icon: mdi:flash
    unit_of_measurement: 'W'
    on_value:
      then:
       - lambda: |-
           if (id(phase_choice) == 2){
             id(active_power).publish_state(id(p2_active_power).state);
           }

    
  - platform: modbustcp_controller
    modbustcp_controller_id: modbus_device_tcp
    name: ${name}_p3_active_power
    id: p3_active_power
    address: 1065  #1045=p2, 1065=p3
    value_type: FP32  
    register_type: read
    accuracy_decimals: 1
    device_class: power
    icon: mdi:flash
    unit_of_measurement: 'W'
    on_value:
      then:
       - lambda: |-
           if (id(phase_choice) == 3){
            id(active_power).publish_state(id(p3_active_power).state);
           }  
            
  - platform: wifi_signal
    name: ${name}_wifi_power
    id: wifi_power
    update_interval: 5s
    
  - platform: uptime
    id: uptime_sec
     
  - platform: debug
    free:
      name: ${name}_heap_free
    loop_time:
      name: ${name}_loop_time
       
binary_sensor:
  - platform: status
    name: ${name}_esp_status
         
button:
  - platform: restart
    name: ${name}_restart
    
text_sensor:
  - platform: template
    name: ${name}_uptime
    lambda: |-
      int seconds = (id(uptime_sec).state);
      int days = seconds / (24 * 3600);
      seconds = seconds % (24 * 3600); 
      int hours = seconds / 3600;
      seconds = seconds % 3600;
      int minutes = seconds /  60;
      seconds = seconds % 60;
      if ( days ) {
        return { (std::to_string(days) +"d " + std::to_string(hours) +"h " + std::to_string(minutes) +"m "+ std::to_string(seconds) +"s ").c_str() };
      } else if ( hours ) {
        return { (std::to_string(hours) +"h " + std::to_string(minutes) +"m "+ std::to_string(seconds) +"s ").c_str() };
      } else if ( minutes ) {
        return { (std::to_string(minutes) +"m "+ std::to_string(seconds) +"s ").c_str() };
      } else {
        return { (std::to_string(seconds) +"s ").c_str() };
      }  
    icon: mdi:clock-start
    update_interval: 113s
    
              
packages: 
          
  bms: 
    url: https://github.com/SeByDocKy/pvbrain2/
    ref: main
    refresh: 0s
    files: 
      - path: 'pvbrain2/bms/jikong/device_jkpbbms.yaml'
        vars:
          bms_name: 'jkpbbms'
          bms_modbus_id: 'modbus_rtu'
          bms_modbus_address: ${bms_modbus_address}
          bms_update_interval: '1500ms'
          bms_template_update: '3s'
          bms_text_update: '60s'
          bms_modbus_throttle: '50ms'

  # bms: !include
    # file: 'device_jkpb0116.yaml'
    # vars:
      # bms_name: 'jkpbbms'
      # bms_modbus_id: 'modbus_rtu'
      # bms_modbus_address: ${bms_modbus_address}
      # bms_update_interval: '1500ms'
      # bms_template_update: '3s'
      # bms_text_update: '60s'
      # bms_modbus_throttle: '50ms'          


  pcm: 
    url: https://github.com/SeByDocKy/myESPhome/
    ref: main
    refresh: 0s
    files: 
      - path: 'code/device_mcp2515_pcm.yaml' 
        vars:
          pcm_name: 'pcm'
          pcm_spid_id: 'shared_spi'
          pcm_cs_pin: 'GPIO06'
          pcm_canbus_id: 'pcm_can'
          pcm_address: '01'
          pcm_interval: '2200ms' #'1500ms'
          pcm_interval_slow: '30s' #'1500ms'
          pcm_text_sensor_interval: '2200ms'
          pcm_min_charging: '1'
          pcm_max_charging: '70'
          pcm_min_discharging: '1'
          pcm_max_discharging: '75'
   
  dualpidpcm:
    url: https://github.com/SeByDocKy/myESPhome/
    ref: main
    refresh: 0s
    files:
      - path: 'code/device_dualpidpcm.yaml'
        vars:
          dualpidpcm_id: 'pid_id'
          dualpidpcm_name: 'pid'
          dualpidpcm_input_id: 'active_power'
          dualpidpcm_battery_voltage_id: 'jkpbbms_battery_voltage' #'battery_voltage_from_ha'
          dualpidpcm_charging_output_id: 'charging_current_output'
          dualpidpcm_discharging_output_id: 'discharging_current_output'
          dualpidpcm_discharge_charge_switch_id: 'discharge_charge_switch'
          dualpidpcm_onoff_switch_id: 'power_switch'
          dualpidpcm_current_min_charging: '1.0'
          dualpidpcm_current_min_discharging: '1.0'
          dualpidpcm_windows_size: '1'
          dualpidpcm_template_update: '5s'