substitutions:
  name: "lora_router"
  name_controller: "pvbrain2"
  device_description: "LoRa router module"
  my_hours: '23'
  my_minute: '59'
  my_second: '59'
  baud_rate_0: 115200
  baud_rate_1: 9600
  
  
globals:
  - id: energy_yesterday_global
    type: float
    restore_value: yes  
 
esphome:
  name: ${name}
  comment: ${device_description}
  min_version: 2026.1.0

esp32:
  board: esp32dev
  cpu_frequency: 240Mhz
  framework:
    type: esp-idf
    version: 'dev'

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "battery_bidirectional"
    password: !secret ap_password
        
time:
  - platform: sntp
    id: my_time
    on_time:
      - seconds: 59
        minutes: 59
        hours: 23
        then:  
          - globals.set:
              id: energy_yesterday_global
              value: !lambda return ( id(energy_yesterday_global) =  float( id(energy_today).state) );    

api:
  batch_delay: 50ms

ota:
  - platform: esphome
  
logger:
  # hardware_uart: USB_SERIAL_JTAG
  level: verbose
  # level: none
    
external_components:
  - source: "github://SeByDocKy/myESPhome/"
    components: [rylr998]
    refresh: 10s
    
  # - source:
      # type: local
      # path: components 
    # components: [rylr998]  
    
debug:
  update_interval: 5s    
    
uart:
  - id: uart_0
    tx_pin: GPIO25
    rx_pin: GPIO26
    baud_rate: ${baud_rate_0}
    
  - id: uart_1
    tx_pin: GPIO33
    rx_pin: GPIO32
    baud_rate: ${baud_rate_1}
    stop_bits: 2
    
modbus:
  - id: modbus_1
    uart_id: uart_1
  
i2c:
  id: i2c_bus
  sda: GPIO14
  scl: GPIO27
  scan: true
  
gp8403:
  - id: gp8413_id
    voltage: '10V'
    i2c_id: i2c_bus
    address: '0x5F'
    model: 'gp8403'  
  
output:
  - platform: gp8403
    id: gp8413_output
    gp8403_id: gp8413_id
    channel: 0 
    
fan:
  - platform: speed
    id: command
    name: ${name}_command
    output: gp8413_output

rylr998:
  id: lora
  uart_id: uart_0
  address: 2
  frequency: 868MHz
  spreading_factor: 9
  signal_bandwidth: 125kHz
  coding_rate: 1
  preamble_length: 12
  network_id: 10
  tx_power: 20
  air_time: false

button:
  - platform: restart
    name: ${name}_restart
       
packet_transport:
  platform: rylr998
  rylr998_id: lora
  update_interval: '1500ms' #'2500ms' for battery v1 with HMS
  encryption: !secret encryption_key
  sensors:
    - power
  providers:
    - name: ${name_controller}
      encryption: !secret encryption_key

number:
  - platform: rylr998
    tx_power:
      name: ${name}_tx_power

sensor:
  - platform: pzemac
    modbus_id: modbus_1
    update_interval: '1500ms'
    power:
      name: ${name}_power
      id: power
      accuracy_decimals: 1
    power_factor:
      name: ${name}_power_factor
      id: power_factor
      accuracy_decimals: 2
      
  - platform: wifi_signal
    name: ${name}_wifi_power
    id: wifi_power
    update_interval: 5s
    
  - platform: uptime
    id: uptime_sec

  - platform: debug
    free:
      name: ${name}_heap_free
    loop_time:
      name: ${name}_loop_time    

  - platform: rylr998
    rssi:
      name: ${name}_rssi
    snr:
      name: ${name}_snr
    last_error:
      name: ${name}_last_error  
        
  - platform: packet_transport
    provider: ${name_controller}
    name: ${name}_router_output_received  #from A
    internal: false
    id: router_output_received
    remote_id: offlora_output
    icon: mdi:numeric
    state_class: measurement
    accuracy_decimals: 2
    on_value:
      then:
        - output.set_level:
            id: gp8413_output
            level: !lambda |-
               return x;
               
               
  - platform: total_daily_energy
    name: ${name}_energy_today
    id: energy_today
    power_id: power
    unit_of_measurement: 'kWh'
    accuracy_decimals: 1
    method: right
    restore: true
    filters:
      - multiply: 0.001
    icon: mdi:counter
    
  - platform: template
    name: ${name}_energy_yesterday
    id: energy_yesterday
    unit_of_measurement: 'kWh'
    accuracy_decimals: 1
    icon: mdi:counter
    update_interval: '2s'
    lambda: |-
      return (id(energy_yesterday).state = id(energy_yesterday_global));               
                        
text_sensor:
  - platform: template
    name: ${name}_uptime
    lambda: |-
      int seconds = (id(uptime_sec).state);
      int days = seconds / (24 * 3600);
      seconds = seconds % (24 * 3600); 
      int hours = seconds / 3600;
      seconds = seconds % 3600;
      int minutes = seconds /  60;
      seconds = seconds % 60;
      if ( days ) {
        return { (std::to_string(days) +"d " + std::to_string(hours) +"h " + std::to_string(minutes) +"m "+ std::to_string(seconds) +"s ").c_str() };
      } else if ( hours ) {
        return { (std::to_string(hours) +"h " + std::to_string(minutes) +"m "+ std::to_string(seconds) +"s ").c_str() };
      } else if ( minutes ) {
        return { (std::to_string(minutes) +"m "+ std::to_string(seconds) +"s ").c_str() };
      } else {
        return { (std::to_string(seconds) +"s ").c_str() };
      }
    icon: mdi:clock-start
    update_interval: 113s               